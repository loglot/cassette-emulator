<head></head>
<body>
    <canvas id="canvas"></canvas>
    <style>
        body{
            padding:0;
            margin:0;

        }
        .drag{
            position: absolute;
            -webkit-app-region: drag;
            padding:0;
            margin:0;
            width: 100%;
            height: 25px;
            bottom: 0px;
        }
        canvas{
            cursor: pointer;
            position:absolute;
            top:50%;
            left:50%;
            transform: translate(-50%, -50%); 
            background-color: #ff909000;
            width: 145px;
            height: 90px;
        }
    </style>
<script type="text/javascript">
window.onerror = function(msg, url, line, col, error) {
   var extra = !col ? '' : '\ncolumn: ' + col;
   extra += !error ? '' : '\nerror: ' + error;
   alert("Error: " + msg + "\nurl: " + url + "\nline: " + line + extra);
   var suppressErrorAlert = true;
   return suppressErrorAlert;
};
</script>
    <script type="module" src="../keydrown.js"></script>
    <script type="module" src="tape.js"></script>

    <div class="drag"></div>
</body>
